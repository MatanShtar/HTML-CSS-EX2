<!DOCTYPE html>
<html>
    
    <head>
        <title> Board Game r Us </title>
        <link rel="stylesheet" href="css/index.css">
        <meta charset="UTF-8">
    </head>
    
    
    <body>
        <div id="wrapper"> 
            <header>
                <div class="logo">
                    <img src="Assets/Header_Logo.png" alt="Header_Logo" width="70"><br>
                </div>
                <div class="title"> Board Games r Us</div>
                <div class="buttons"> 
                    <div class="home"> Home </div>
                    <div class="shop"> Our Games </div>
                    <div class="about"> About </div>
                    <div class="contact"> Contact Us </div>
                </div>

            </header>
            <main>
                <div class="welcome"> Welcome to the store! </div>
            </main>
            <footer>
                <div class ="footer_boxes">
                    <div class ="footer_box"> 
                        <div class="footer_box_title"> Who We Are</div>
                        <div class="footer_clickables">
                            <div class="footer_about"> About </div>
                            <div class="footer_team"> Team </div>
                            <div class="footer_work"> Work With Us </div>
                        </div>
                        <div class="social_logos">
                                <img src="Assets/Twitter_logo.png" alt="Header_Logo" width="20">
                                <img src="Assets/Facebook_logo.png" alt="Header_Logo" width="20">
                                <img src="Assets/Instagram_logo.png" alt="Header_Logo" width="20">
                        </div>
                        
                    </div>
                    
                    <div class ="footer_box"> 
                        <div class="footer_box_title"> Follow Us</div>
                        <div class="footer_clickables">
                            <div class="footer_twitter"> Twitter </div>
                            <div class="footer_facebook"> Facebook </div>
                            <div class="footer_instagram"> Instagram </div>
                        </div>
                    </div>
                </div>
            <div class="copyright"> (c) 2026 Board Games r Us </div>
            </footer>
        </div>
    </body>
    
</html>
