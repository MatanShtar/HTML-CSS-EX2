<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/our-games.css" />
    <title>Our Games</title>
  </head>
  <body>
    <div id="wrapper">
      <header>
        <div class="logo-wrapper">
          <div class="logo">
            <img src="Assets/Header_Logo.png" alt="Header_Logo" width="70" />
          </div>
          <div class="title">BOARD GAMES</div>
        </div>

        <div class="header-buttons">
          <a class="home" href="index.html">Home</a>
          <a class="shop">Our Games</a>
          <a class="about">About</a>
          <a class="contact">Contact Us</a>
        </div>
      </header>

      <main>
        <div class="header-games-imgs">
          <img src="Assets/7th-continent.jpg" />
          <img src="Assets/underwater-cities.jpg" />
          <img src="Assets/azul.jpg" />
        </div>

        <h2 class="game-list-title">List of Games</h2>
        <div class="game-list">
          <ul>
            <li>
              <img src="Assets/rocket-icon.svg" /><span>7th Continent</span>
            </li>
            <li>
              <img src="Assets/rocket-icon.svg" /><span>Underwater Cities</span>
            </li>
            <li><img src="Assets/rocket-icon.svg" /><span>Azul</span></li>
            <li>
              <img src="Assets/rocket-icon.svg" /><span
                >Cards Against Humanity</span
              >
            </li>
          </ul>
        </div>

        <h2 class="yt-title">Our Top Games of 2025</h2>
        <iframe
          width="100%"
          height="600"
          src="https://www.youtube.com/embed/b7oAU0Q6TZI?si=ELrT2iNQ0gy-Nk26"
          title="YouTube video player"
          frameborder="0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen
        ></iframe>
      </main>

      <footer>
        <div class="footer-boxes">
          <div class="footer-box">
            <div class="footer-box-title">WHO WE ARE</div>
            <div class="footer-clickables">
              <a class="footer-about">About</a>
              <a class="footer-team">Team</a>
              <a class="footer-work">Work With Us</a>
            </div>
            <div class="social-logos">
              <a href="https://x.com" target="_blank"
                ><img src="Assets/Twitter_logo.png" alt="Twitter logo"
              /></a>
              <a href="https://facebook.com" target="_blank"
                ><img src="Assets/Facebook_logo.png" alt="Facebook logo"
              /></a>
              <a href="https://instagram.com" target="_blank"
                ><img src="Assets/Instagram_logo.png" alt="Instagram logo"
              /></a>
            </div>
          </div>

          <div class="footer-box">
            <div class="footer-box-title">FOLLOW US</div>
            <div class="footer-clickables">
              <a class="footer-twitter" href="https://x.com" target="_blank"
                >Twitter</a
              >
              <a
                class="footer-facebook"
                href="https://facebook.com"
                target="_blank"
                >Facebook</a
              >
              <a
                class="footer-instagram"
                href="https://instagram.com"
                target="_blank"
                >Instagram</a
              >
            </div>
          </div>
        </div>
        <div class="copyright">© 2026 Board Games</div>
      </footer>
    </div>
  </body>
</html>
